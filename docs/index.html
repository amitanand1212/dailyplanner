<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Planner — Legal</title>
  <style>
    :root { --primary: #6C5CE7; --ink: #1A1D2E; --muted: #5b6070; --bg: #F4F5FA; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 36px 32px; max-width: 420px; width: 90%;
      box-shadow: 0 8px 28px rgba(26,29,46,0.10); text-align: center;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 18px; background: var(--primary);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 12px;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    p { color: var(--muted); margin: 0 0 24px; }
    a.btn {
      display: block; text-decoration: none; background: var(--primary); color: #fff;
      padding: 14px; border-radius: 14px; font-weight: 600; margin-top: 12px;
    }
    a.btn.alt { background: #EDEBFB; color: var(--primary); }
    footer { margin-top: 22px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📅</div>
    <h1>Daily Planner</h1>
    <p>Legal &amp; privacy information</p>
    <a class="btn" href="privacy-policy.html">Privacy Policy</a>
    <a class="btn alt" href="data-safety.html">Data Safety</a>
    <footer>&copy; 2026 Daily Planner</footer>
  </div>
</body>
</html>
